---
# Healthcheck playbook — runs diagnostic scripts on target hosts
# Usage: ansible-playbook -i inventories/<env>/hosts.yml playbooks/healthcheck.yml
#
# Run a specific check only:
#   --tags system     →  System health (disk, memory, updates, systemd)
#   --tags docker     →  Docker services (containers, disk, images)
#   --tags services   →  Service reachability (HTTP, DNS, TCP ports)
#   --tags all        →  Everything (default)

- name: Homelab health checks
  hosts: docker_hosts
  become: true
  gather_facts: false
  tasks:
    - name: Run system health check
      tags: [system, always_check]
      block:
        - name: Copy system check script
          ansible.builtin.copy:
            src: "{{ playbook_dir }}/../../scripts/check-system.sh"
            dest: /tmp/check-system.sh
            mode: "0755"

        - name: Execute system health check
          ansible.builtin.command: /tmp/check-system.sh
          register: system_check
          changed_when: false
          failed_when: system_check.rc > 1

        - name: System check results
          ansible.builtin.debug:
            msg: "{{ system_check.stdout_lines }}"

    - name: Run Docker health check
      tags: [docker]
      block:
        - name: Copy Docker check script
          ansible.builtin.copy:
            src: "{{ playbook_dir }}/../../scripts/check-docker.sh"
            dest: /tmp/check-docker.sh
            mode: "0755"

        - name: Execute Docker health check
          ansible.builtin.command: /tmp/check-docker.sh
          register: docker_check
          changed_when: false
          failed_when: docker_check.rc > 1

        - name: Docker check results
          ansible.builtin.debug:
            msg: "{{ docker_check.stdout_lines }}"

    - name: Run service reachability check
      tags: [services]
      block:
        - name: Copy services check script
          ansible.builtin.copy:
            src: "{{ playbook_dir }}/../../scripts/check-services.sh"
            dest: /tmp/check-services.sh
            mode: "0755"

        - name: Execute service reachability check
          ansible.builtin.command: /tmp/check-services.sh
          register: services_check
          changed_when: false
          failed_when: services_check.rc > 1

        - name: Service check results
          ansible.builtin.debug:
            msg: "{{ services_check.stdout_lines }}"

    - name: Clean up temporary scripts
      tags: [always]
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/check-system.sh
        - /tmp/check-docker.sh
        - /tmp/check-services.sh
      changed_when: false
