all:
  children:
    remote_vps:
      hosts:
        ovh-vps:
          ansible_host: "{{ vault_vps_public_ip }}"
          ansible_port: 55022
          ansible_user: ansible
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519_ansible
          ansible_python_interpreter: /usr/bin/python3
          # CUSTOMIZE: Replace with your Dokploy URL
          dokploy_url: https://dokploy.example.com
          tailscale_hostname: "ovh-vps"
          tailscale_accept_routes: true
    # Uncomment to enable Docker app deployment on the VPS:
    # docker_hosts:
    #   hosts:
    #     ovh-vps:
