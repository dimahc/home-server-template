title: 🏠 Maison
views:
  - title: Accueil
    path: home
    icon: mdi:home
    cards:
      - type: custom:mushroom-title-card
        title: >-
          {% set h = now().hour %} {% if h < 6 %}Bonne nuit 🌙 {% elif h < 12
          %}Bonjour ☀️ {% elif h < 18 %}Bon après-midi 🌤️ {% else %}Bonsoir
          🌆{% endif %}
        subtitle: "{{ now().strftime('%A %d %B %Y · %H:%M') }}"
      - type: custom:mushroom-chips-card
        alignment: center
        chips:
          - type: weather
            entity: weather.forecast_maison
            show_conditions: true
            show_temperature: true
          - type: template
            icon: mdi:sofa
            content: Salon
            tap_action:
              action: navigate
              navigation_path: /super-dashboard/salon
            icon_color: orange
          - type: template
            icon: mdi:bed
            content: Chambre
            tap_action:
              action: navigate
              navigation_path: /super-dashboard/chambre
            icon_color: blue
          - type: template
            icon: mdi:silverware-fork-knife
            content: Cuisine
            tap_action:
              action: navigate
              navigation_path: /super-dashboard/cuisine
            icon_color: pink
          - type: template
            icon: mdi:thermostat
            content: Climat
            tap_action:
              action: navigate
              navigation_path: /super-dashboard/climat
            icon_color: red
          - type: template
            icon: mdi:music
            content: Média
            tap_action:
              action: navigate
              navigation_path: /super-dashboard/media
            icon_color: deep-purple
          - type: template
            icon: mdi:robot-vacuum
            content: Aspiro
            tap_action:
              action: navigate
              navigation_path: /super-dashboard/vacuum
            icon_color: teal
      - type: weather-forecast
        entity: weather.forecast_maison
        show_forecast: true
        forecast_type: daily
        card_mod:
          style: |
            ha-card { border-radius: 16px !important; }
      - type: custom:mushroom-title-card
        title: ""
        subtitle: 📈 Tendances climat
      - type: history-graph
        entities:
          - entity: sensor.echo_dot_salon_temperature
            name: Température
          - entity: sensor.humidifier_humidity
            name: Humidité
        hours_to_show: 24
        card_mod:
          style: |
            ha-card { border-radius: 16px !important; }
      - type: history-graph
        entities:
          - entity: sensor.core_300s_series_pm2_5
            name: PM2.5 (µg/m³)
        hours_to_show: 24
        card_mod:
          style: |
            ha-card { border-radius: 16px !important; }
      - type: custom:mushroom-title-card
        title: ""
        subtitle: 💡 Lumières
      - type: grid
        columns: 3
        square: false
        cards:
          - type: custom:mushroom-light-card
            entity: light.living_room_light
            name: Salon
            icon: mdi:floor-lamp
            use_light_color: true
            show_brightness_control: true
            show_color_control: true
            layout: vertical
            card_mod:
              style: |
                ha-card {
                  border-radius: 16px;
                  background: {% if is_state('light.living_room_light','on') %}rgba(255,180,50,0.15){% else %}var(--ha-card-background){% endif %};
                }
          - type: custom:mushroom-light-card
            entity: light.bedroom_light
            name: Chambre
            icon: mdi:lamp
            use_light_color: true
            show_brightness_control: true
            show_color_control: true
            layout: vertical
            card_mod:
              style: |
                ha-card {
                  border-radius: 16px;
                  background: {% if is_state('light.bedroom_light','on') %}rgba(100,150,255,0.15){% else %}var(--ha-card-background){% endif %};
                }
          - type: custom:mushroom-light-card
            entity: light.kitchen_light
            name: Cuisine
            icon: mdi:ceiling-light
            use_light_color: true
            show_brightness_control: true
            show_color_control: true
            layout: vertical
            card_mod:
              style: |
                ha-card {
                  border-radius: 16px;
                  background: {% if is_state('light.kitchen_light','on') %}rgba(255,130,200,0.15){% else %}var(--ha-card-background){% endif %};
                }
      - type: custom:mushroom-template-card
        primary: Tout éteindre
        icon: mdi:lightbulb-group-off
        icon_color: red
        layout: horizontal
        tap_action:
          action: perform-action
          perform_action: homeassistant.turn_on
          target:
            entity_id: scene.turn_off_all_lights
        card_mod:
          style: |
            ha-card { border-radius: 16px; }
      - type: custom:mushroom-title-card
        title: ""
        subtitle: 🏠 Pièces
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-template-card
            primary: Salon
            secondary: >-
              🌡️ {{ states('sensor.echo_dot_salon_temperature') }}°C · 💡 {{
              states('sensor.echo_dot_salon_eclairement') }} lux
            icon: mdi:sofa
            icon_color: orange
            tap_action:
              action: navigate
              navigation_path: /super-dashboard/salon
            card_mod:
              style: |
                ha-card { border-radius: 16px; }
          - type: custom:mushroom-template-card
            primary: Chambre
            secondary: >-
              {% if not is_state('media_player.echo_pop_chambre','standby') and
              not is_state('media_player.echo_pop_chambre','idle') %} 🎵 {{
              state_attr('media_player.echo_pop_chambre','media_title') or
              'Lecture…' }} {% else %}Calme{% endif %}
            icon: mdi:bed
            icon_color: blue
            tap_action:
              action: navigate
              navigation_path: /super-dashboard/chambre
            card_mod:
              style: |
                ha-card { border-radius: 16px; }
          - type: custom:mushroom-template-card
            primary: Cuisine
            secondary: >-
              {{ '💡 Allumée' if is_state('light.kitchen_light','on') else '💡
              Éteinte' }}
            icon: mdi:silverware-fork-knife
            icon_color: pink
            tap_action:
              action: navigate
              navigation_path: /super-dashboard/cuisine
            card_mod:
              style: |
                ha-card { border-radius: 16px; }
          - type: custom:mushroom-template-card
            primary: Aspirateur
            secondary: >-
              {{ states('vacuum.x50_ultra_complete') | capitalize }} · 🔋 {{
              states('sensor.x50_ultra_complete_battery_level') }}%
            icon: mdi:robot-vacuum
            icon_color: >-
              {% if is_state('vacuum.x50_ultra_complete','cleaning') %}green {%
              elif is_state('vacuum.x50_ultra_complete','docked') %}blue {% else
              %}grey{% endif %}
            tap_action:
              action: navigate
              navigation_path: /super-dashboard/vacuum
            card_mod:
              style: |
                ha-card { border-radius: 16px; }
          - type: custom:mushroom-template-card
            primary: Climat
            secondary: >-
              🔥 {{ states('climate.heater_heater') | capitalize }} · 💨 {{
              states('sensor.core_300s_series_pm2_5') }} PM2.5 · 💧 {{
              states('sensor.humidifier_humidity') }}%
            icon: mdi:thermostat
            icon_color: >-
              {% if not is_state('climate.heater_heater','off') %}red {% elif
              is_state('fan.core_300s_series','on') %}cyan {% else %}grey{%
              endif %}
            tap_action:
              action: navigate
              navigation_path: /super-dashboard/climat
            card_mod:
              style: |
                ha-card { border-radius: 16px; }
      - type: conditional
        conditions:
          - condition: state
            entity: media_player.echo_dot_salon
            state_not: standby
          - condition: state
            entity: media_player.echo_dot_salon
            state_not: idle
        card:
          type: custom:mushroom-media-player-card
          entity: media_player.echo_dot_salon
          name: 🔊 Echo Dot — Salon
          use_media_info: true
          show_volume_level: true
          media_controls:
            - play_pause_stop
            - previous
            - next
          volume_controls:
            - volume_set
          card_mod:
            style: |
              ha-card { border-radius: 16px; }
      - type: conditional
        conditions:
          - condition: state
            entity: media_player.echo_pop_chambre
            state_not: standby
          - condition: state
            entity: media_player.echo_pop_chambre
            state_not: idle
        card:
          type: custom:mushroom-media-player-card
          entity: media_player.echo_pop_chambre
          name: 🔊 Echo Pop — Chambre
          use_media_info: true
          show_volume_level: true
          media_controls:
            - play_pause_stop
            - previous
            - next
          volume_controls:
            - volume_set
          card_mod:
            style: |
              ha-card { border-radius: 16px; }
      - type: custom:mushroom-chips-card
        alignment: center
        chips:
          - type: template
            icon: mdi:cellphone
            icon_color: >-
              {% if states('sensor.pixel_9_pro_xl_battery_level')|int(0) > 50
              %}green {% elif
              states('sensor.pixel_9_pro_xl_battery_level')|int(0) > 20
              %}amber {% else %}red{% endif %}
            content: "{{ states('sensor.pixel_9_pro_xl_battery_level') }}%"
            tap_action:
              action: navigate
              navigation_path: /super-dashboard/phone
          - type: template
            icon: mdi:wifi
            icon_color: cyan
            content: "{{ states('sensor.pixel_9_pro_xl_bluetooth_connection') }}"
          - type: template
            icon: >-
              {% if is_state('sun.sun','above_horizon') %}mdi:weather-sunny{%
              else %}mdi:weather-night{% endif %}
            icon_color: >-
              {% if is_state('sun.sun','above_horizon') %}amber{% else
              %}indigo{% endif %}
            content: "{{ state_attr('sun.sun','elevation')|round(1) }}°"
          - type: template
            icon: mdi:server
            icon_color: teal
            content: Système
            tap_action:
              action: navigate
              navigation_path: /super-dashboard/system
  - title: Salon
    path: salon
    icon: mdi:sofa
    cards:
      - type: custom:mushroom-title-card
        title: Salon
        subtitle: Espace de vie
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.echo_dot_salon_temperature') }}°C"
            secondary: Température
            icon: mdi:thermometer
            icon_color: >-
              {% set t =
              states('sensor.echo_dot_salon_temperature')|float(0) %} {% if t >
              26 %}red{% elif t > 22 %}orange{% elif t > 18 %}green{% else
              %}blue{% endif %}
            layout: vertical
            card_mod:
              style: |
                ha-card { border-radius: 16px; }
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.echo_dot_salon_eclairement') }} lux"
            secondary: Luminosité
            icon: mdi:brightness-6
            icon_color: >-
              {% set l = states('sensor.echo_dot_salon_eclairement')|float(0) %}
              {% if l > 200 %}yellow{% elif l > 50 %}amber{% else %}grey{%
              endif %}
            layout: vertical
            card_mod:
              style: |
                ha-card { border-radius: 16px; }
      - type: history-graph
        entities:
          - entity: sensor.echo_dot_salon_temperature
            name: Température (°C)
          - entity: sensor.echo_dot_salon_eclairement
            name: Luminosité (lux)
        hours_to_show: 24
        card_mod:
          style: |
            ha-card { border-radius: 16px !important; }
      - type: custom:mushroom-light-card
        entity: light.living_room_light
        name: Lumière du salon
        icon: mdi:floor-lamp
        use_light_color: true
        show_brightness_control: true
        show_color_control: true
        card_mod:
          style: |
            ha-card {
              border-radius: 16px;
              background: {% if is_state('light.living_room_light','on') %}rgba(255,180,50,0.12){% else %}var(--ha-card-background){% endif %};
            }
      - type: custom:mushroom-media-player-card
        entity: media_player.echo_dot_salon
        name: Echo Dot
        icon: mdi:speaker
        use_media_info: true
        show_volume_level: true
        media_controls:
          - play_pause_stop
          - previous
          - next
        volume_controls:
          - volume_mute
          - volume_set
        card_mod:
          style: |
            ha-card { border-radius: 16px; }
      - type: custom:mushroom-chips-card
        alignment: center
        chips:
          - type: entity
            entity: sensor.echo_dot_salon_next_alarm
            icon: mdi:alarm
          - type: entity
            entity: sensor.echo_dot_salon_next_timer
            icon: mdi:timer-outline
          - type: entity
            entity: sensor.echo_dot_salon_next_reminder
            icon: mdi:bell-outline
          - type: entity
            entity: switch.echo_dot_salon_do_not_disturb_switch
            icon: mdi:bell-off
      - type: custom:mushroom-title-card
        title: ""
        subtitle: 📺 Écrans
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-media-player-card
            entity: media_player.salon_tv_2
            name: Salon TV
            icon: mdi:television
            use_media_info: true
            show_volume_level: true
            media_controls:
              - on_off
              - play_pause_stop
            volume_controls:
              - volume_mute
              - volume_set
            card_mod:
              style: |
                ha-card { border-radius: 16px; }
          - type: custom:mushroom-media-player-card
            entity: media_player.smart_tv_pro
            name: Smart TV Pro
            icon: mdi:television-classic
            use_media_info: true
            show_volume_level: true
            media_controls:
              - on_off
              - play_pause_stop
            volume_controls:
              - volume_mute
              - volume_set
            card_mod:
              style: |
                ha-card { border-radius: 16px; }
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-entity-card
            entity: remote.salon_tv
            name: Télécommande Salon
            icon: mdi:remote
            icon_color: cyan
            tap_action:
              action: more-info
            card_mod:
              style: |
                ha-card { border-radius: 16px; }
          - type: custom:mushroom-entity-card
            entity: remote.smart_tv_pro
            name: Télécommande Smart
            icon: mdi:remote
            icon_color: cyan
            tap_action:
              action: more-info
            card_mod:
              style: |
                ha-card { border-radius: 16px; }
      - type: custom:mushroom-media-player-card
        entity: media_player.hy300_ultra_5521
        name: 🎬 Projecteur HY300
        icon: mdi:projector
        use_media_info: true
        show_volume_level: true
        media_controls:
          - on_off
          - play_pause_stop
        volume_controls:
          - volume_mute
          - volume_set
        card_mod:
          style: |
            ha-card { border-radius: 16px; }
  - title: Chambre
    path: chambre
    icon: mdi:bed
    cards:
      - type: custom:mushroom-title-card
        title: Chambre
        subtitle: Espace nuit
      - type: custom:mushroom-light-card
        entity: light.bedroom_light
        name: Lumière de la chambre
        icon: mdi:lamp
        use_light_color: true
        show_brightness_control: true
        show_color_control: true
        card_mod:
          style: |
            ha-card {
              border-radius: 16px;
              background: {% if is_state('light.bedroom_light','on') %}rgba(100,150,255,0.12){% else %}var(--ha-card-background){% endif %};
            }
      - type: custom:mushroom-media-player-card
        entity: media_player.echo_pop_chambre
        name: Echo Pop
        icon: mdi:speaker
        use_media_info: true
        show_volume_level: true
        media_controls:
          - play_pause_stop
          - previous
          - next
        volume_controls:
          - volume_mute
          - volume_set
        card_mod:
          style: |
            ha-card { border-radius: 16px; }
      - type: custom:mushroom-chips-card
        alignment: center
        chips:
          - type: entity
            entity: sensor.echo_pop_chambre_next_alarm
            icon: mdi:alarm
          - type: entity
            entity: sensor.echo_pop_chambre_next_timer
            icon: mdi:timer-outline
          - type: entity
            entity: sensor.echo_pop_chambre_next_reminder
            icon: mdi:bell-outline
          - type: entity
            entity: switch.echo_pop_chambre_do_not_disturb_switch
            icon: mdi:bell-off
      - type: custom:mushroom-title-card
        title: ""
        subtitle: 📺 Télévision
      - type: custom:mushroom-media-player-card
        entity: media_player.living_room_streamer
        name: Téléviseur de la chambre
        icon: mdi:television
        use_media_info: true
        show_volume_level: true
        media_controls:
          - on_off
          - play_pause_stop
        volume_controls:
          - volume_mute
          - volume_set
        card_mod:
          style: |
            ha-card { border-radius: 16px; }
      - type: custom:mushroom-entity-card
        entity: remote.televiseur_de_la_chambre
        name: Télécommande
        icon: mdi:remote
        icon_color: cyan
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card { border-radius: 16px; }
      - type: custom:mushroom-title-card
        title: ""
        subtitle: 🎧 Casque
      - type: custom:mushroom-media-player-card
        entity: media_player.abdoul_s_wh_1000xm4
        name: Sony WH-1000XM4
        icon: mdi:headphones
        use_media_info: true
        show_volume_level: true
        media_controls:
          - play_pause_stop
          - previous
          - next
        volume_controls:
          - volume_set
        card_mod:
          style: |
            ha-card { border-radius: 16px; }
      - type: custom:mushroom-title-card
        title: ""
        subtitle: 🧹 Aspirateur
      - type: custom:mushroom-template-card
        primary: Aspirateur Chambre
        secondary: >-
          {{ states('vacuum.aspirateur') | capitalize }} · 🔋 {{
          states('sensor.aspirateur_batterie') }}%
        icon: mdi:robot-vacuum-variant
        icon_color: teal
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card { border-radius: 16px; }
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.aspirateur_batterie
            name: Batterie
            icon: mdi:battery
            icon_color: green
            card_mod:
              style: |
                ha-card { border-radius: 16px; }
          - type: custom:mushroom-entity-card
            entity: sensor.aspirateur_zone_de_nettoyage
            name: Zone nettoyée
            icon: mdi:texture-box
            icon_color: blue
            card_mod:
              style: |
                ha-card { border-radius: 16px; }
  - title: Cuisine
    path: cuisine
    icon: mdi:silverware-fork-knife
    cards:
      - type: custom:mushroom-title-card
        title: Cuisine
        subtitle: Espace repas
      - type: custom:mushroom-light-card
        entity: light.kitchen_light
        name: Lumière de la cuisine
        icon: mdi:ceiling-light
        use_light_color: true
        show_brightness_control: true
        show_color_control: true
        card_mod:
          style: |
            ha-card {
              border-radius: 16px;
              background: {% if is_state('light.kitchen_light','on') %}rgba(255,130,200,0.12){% else %}var(--ha-card-background){% endif %};
            }
      - type: custom:mushroom-title-card
        title: ""
        subtitle: 🛒 Liste d'achats
      - type: todo-list
        entity: todo.liste_dachats
        title: ""
        card_mod:
          style: |
            ha-card { border-radius: 16px; }
  - title: Climat
    path: climat
    icon: mdi:thermostat
    cards:
      - type: custom:mushroom-title-card
        title: Climat
        subtitle: Chauffage · Air · Humidité
      - type: custom:mushroom-title-card
        title: ""
        subtitle: 🔥 Chauffage
      - type: custom:mushroom-climate-card
        entity: climate.heater_heater
        name: Chauffage Dreo
        icon: mdi:radiator
        show_temperature_control: true
        hvac_modes:
          - "off"
          - heat
        card_mod:
          style: |
            ha-card {
              border-radius: 16px;
              background: {% if not is_state('climate.heater_heater','off') %}rgba(255,100,50,0.12){% else %}var(--ha-card-background){% endif %};
            }
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-entity-card
            entity: switch.heater_oscillating
            name: Oscillation
            icon: mdi:rotate-3d-variant
            icon_color: orange
            card_mod:
              style: |
                ha-card { border-radius: 16px; }
          - type: custom:mushroom-entity-card
            entity: switch.heater_child_lock
            name: Verrou enfant
            icon: mdi:lock
            icon_color: red
            card_mod:
              style: |
                ha-card { border-radius: 16px; }
          - type: custom:mushroom-entity-card
            entity: switch.heater_ptc
            name: Mode PTC
            icon: mdi:fire
            icon_color: deep-orange
            card_mod:
              style: |
                ha-card { border-radius: 16px; }
          - type: custom:mushroom-entity-card
            entity: switch.heater_panel_sound
            name: Son panneau
            icon: mdi:volume-high
            icon_color: grey
            card_mod:
              style: |
                ha-card { border-radius: 16px; }
      - type: history-graph
        entities:
          - entity: sensor.echo_dot_salon_temperature
            name: Température ambiante
        hours_to_show: 48
        card_mod:
          style: |
            ha-card { border-radius: 16px !important; }
      - type: custom:mushroom-title-card
        title: ""
        subtitle: 🌬️ Purificateur d'air
      - type: custom:mushroom-fan-card
        entity: fan.core_300s_series
        name: Levoit Core 300S
        icon: mdi:air-purifier
        show_percentage_control: true
        show_oscillate_control: false
        card_mod:
          style: |
            ha-card {
              border-radius: 16px;
              background: {% if is_state('fan.core_300s_series','on') %}rgba(100,200,255,0.12){% else %}var(--ha-card-background){% endif %};
            }
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.core_300s_series_pm2_5') }} µg/m³"
            secondary: PM2.5
            icon: mdi:blur
            icon_color: >-
              {% set pm = states('sensor.core_300s_series_pm2_5')|int(0) %} {%
              if pm > 35 %}red{% elif pm > 12 %}orange{% else %}green{% endif %}
            layout: vertical
            card_mod:
              style: |
                ha-card { border-radius: 16px; }
          - type: custom:mushroom-template-card
            primary: >-
              {{ states('sensor.core_300s_series_qualite_de_l_air') | capitalize
              }}
            secondary: Qualité
            icon: mdi:leaf
            icon_color: >-
              {% set q = states('sensor.core_300s_series_qualite_de_l_air') %}
              {% if q == 'excellent' %}green{% elif q == 'good' %}light-green{%
              elif q == 'moderate' %}amber{% else %}red{% endif %}
            layout: vertical
            card_mod:
              style: |
                ha-card { border-radius: 16px; }
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.core_300s_series_filter_lifetime
            name: Filtre
            min: 0
