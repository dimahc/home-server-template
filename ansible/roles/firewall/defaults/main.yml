---
# Firewall configuration
firewall_allowed_tcp_ports:
  - 22 # SSH
  - 53 # DNS (Pi-hole)
  - 80 # HTTP (Traefik)
  - 443 # HTTPS (Traefik)
  - 8080 # Pi-hole admin
  - 8123 # Home Assistant
  - 5000 # Alexa Skill (Music Assistant)
  - 8095 # Music Assistant web
  - 8097 # Music Assistant stream

firewall_allowed_udp_ports:
  - 53 # DNS (Pi-hole)
  - 41641 # Tailscale WireGuard

firewall_default_policy: deny
