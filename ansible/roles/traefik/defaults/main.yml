---
traefik_image: "traefik:v3.6.9"
traefik_container_name: "traefik"
traefik_dir: "/opt/homelab/traefik"
traefik_config_dir: "{{ traefik_dir }}/config"
traefik_dynamic_config_dir: "{{ traefik_dir }}/dynamic"
traefik_network: "homelab"
traefik_entrypoints:
  - name: web
    address: ":80"
# CUSTOMIZE: Override in group_vars for your domain
traefik_domain: "lan.example.com"
# CUSTOMIZE: Set your server's IP (reachable from Traefik bridge network)
traefik_backend_ip: "192.168.0.10"
traefik_enable_acme: false
traefik_acme_email: "you@example.com"
traefik_acme_resolver: "letsencrypt"
traefik_acme_storage: "{{ traefik_dir }}/acme.json"
traefik_acme_challenge_entrypoint: "web"
